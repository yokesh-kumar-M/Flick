version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./gateway:/app/gateway
      - ./shared:/app/shared
      - media_data:/app/gateway/media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./auth_service:/app/auth_service
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  catalog_service:
    build:
      context: .
      dockerfile: catalog_service/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./catalog_service:/app/catalog_service
      - ./shared:/app/shared
      - media_data:/app/catalog_service/media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8002/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  access_service:
    build:
      context: .
      dockerfile: access_service/Dockerfile
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./access_service:/app/access_service
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8003/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  streaming_service:
    build:
      context: .
      dockerfile: streaming_service/Dockerfile
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./streaming_service:/app/streaming_service
      - ./shared:/app/shared
      - media_data:/app/streaming_service/media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8004/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  recommendation_service:
    build:
      context: .
      dockerfile: recommendation_service/Dockerfile
    ports:
      - "8005:8005"
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./recommendation_service:/app/recommendation_service
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8005/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  notification_service:
    build:
      context: .
      dockerfile: notification_service/Dockerfile
    ports:
      - "8006:8006"
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./notification_service:/app/notification_service
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8006/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  celery_recommendation:
    build:
      context: .
      dockerfile: recommendation_service/Dockerfile
    command: celery -A recommendation_project worker -l info -B
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./recommendation_service:/app/recommendation_service
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
      recommendation_service:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  celery_streaming:
    build:
      context: .
      dockerfile: streaming_service/Dockerfile
    command: celery -A streaming_project worker -l info
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./streaming_service:/app/streaming_service
      - ./shared:/app/shared
      - media_data:/app/streaming_service/media
    depends_on:
      redis:
        condition: service_healthy
      streaming_service:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
