<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="feelgoodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff">
         <animate attributeName="stop-color" values="#ffffff;#e4e4e7;#ffffff" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#71717a">
         <animate attributeName="stop-color" values="#71717a;#a1a1aa;#71717a" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="#000000" stroke="#27272a" stroke-width="2"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="url(#feelgoodGrad)" stroke-width="4">
    <animate attributeName="r" values="25;28;25" dur="3s" repeatCount="indefinite" />
  </circle>
  <path d="M40 45 Q50 35 60 45 Q50 60 40 45 Z" fill="url(#feelgoodGrad)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2; 0 0" dur="1.5s" repeatCount="indefinite" />
  </path>
</svg>
