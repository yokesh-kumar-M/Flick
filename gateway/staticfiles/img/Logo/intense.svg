<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="intenseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#d4d4d8;#ffffff" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#71717a">
        <animate attributeName="stop-color" values="#71717a;#a1a1aa;#71717a" dur="2s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="#000000" stroke="#27272a" stroke-width="2"/>
  <path d="M50 20 C60 40 80 50 65 70 C55 85 45 85 35 70 C20 50 40 40 50 20 Z" fill="url(#intenseGrad)">
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" cx="50" cy="50" dur="1.5s" repeatCount="indefinite" />
  </path>
</svg>
