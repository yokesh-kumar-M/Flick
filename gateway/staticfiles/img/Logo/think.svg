<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="thinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff">
         <animate attributeName="stop-color" values="#ffffff;#a1a1aa;#ffffff" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#27272a">
         <animate attributeName="stop-color" values="#27272a;#52525b;#27272a" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="#000000" stroke="#27272a" stroke-width="2"/>
  <rect x="35" y="35" width="10" height="30" fill="url(#thinkGrad)">
     <animate attributeName="height" values="30;10;30" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <rect x="55" y="35" width="10" height="30" fill="url(#thinkGrad)">
     <animate attributeName="height" values="10;30;10" dur="1.5s" repeatCount="indefinite" />
  </rect>
</svg>
