<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="epicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff">
         <animate attributeName="stop-color" values="#ffffff;#e4e4e7;#ffffff" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#52525b">
         <animate attributeName="stop-color" values="#52525b;#71717a;#52525b" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="#000000" stroke="#27272a" stroke-width="2"/>
  <ellipse cx="50" cy="50" rx="35" ry="10" transform="rotate(-30 50 50)" fill="none" stroke="url(#epicGrad)" stroke-width="4">
    <animateTransform attributeName="transform" type="rotate" values="-30 50 50; 330 50 50" dur="15s" repeatCount="indefinite" />
  </ellipse>
  <circle cx="50" cy="50" r="14" fill="url(#epicGrad)">
    <animate attributeName="r" values="14;16;14" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
