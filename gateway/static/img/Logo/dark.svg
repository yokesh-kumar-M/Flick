<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff">
         <animate attributeName="stop-color" values="#ffffff;#a1a1aa;#ffffff" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="#000000" stroke="#27272a" stroke-width="2"/>
  <path d="M60 25 A 30 30 0 0 0 40 80 A 40 40 0 0 1 60 25 Z" fill="url(#darkGrad)">
    <animateTransform attributeName="transform" type="rotate" values="0 50 50; 10 50 50; 0 50 50" dur="6s" repeatCount="indefinite" />
  </path>
</svg>
