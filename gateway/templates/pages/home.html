{% extends 'base.html' %}
{% load static %}

{% block title %}Home{% endblock %}

{% block content %}
<!-- Cinematic Spotlight Hero -->
<div id="heroSection" class="spotlight-container">
    <div class="hero" style="background: var(--theme-surface);">
        <div class="hero-content">
            <div class="skeleton skeleton-text lg" style="width:300px;height:48px;"></div>
            <div class="skeleton skeleton-text" style="width:450px;margin-top:16px;height:18px;"></div>
            <div class="skeleton skeleton-text sm" style="width:200px;margin-top:12px;height:14px;"></div>
        </div>
    </div>
</div>

<!-- Orbital Genre Ring Navigation -->
<section class="orbital-section" id="orbitalSection" style="display:none;">
    <h2 class="orbital-section-title">Explore Genres</h2>
    <p class="orbital-section-subtitle">Click a genre orb to discover movies</p>
    <div class="orbital-ring-container" id="orbitalRingContainer">
        <div class="orbital-ring"></div>
        <div class="orbital-ring-inner"></div>
        <div class="orbital-center">
            <span id="orbitalCenterText"><img src="/static/img/Logo/logo.svg"
                    style="width:48px; border-radius:12px; box-shadow:0 0 15px rgba(255,255,255,0.2);"></span>
        </div>
        <!-- Genre nodes injected by JS -->
    </div>
    <div class="orbital-expanded" id="orbitalExpanded">
        <div class="movie-grid stagger-children" id="orbitalMovies"></div>
    </div>
</section>

<!-- Content Sections -->
<div id="contentSections">
    <section class="section">
        <div class="section-header">
            <div class="skeleton skeleton-text" style="width:180px;height:28px;"></div>
        </div>
        <div class="carousel" style="padding:0 var(--space-xl);">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>
    </section>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let heroIndex = 0;
    let heroMovies = [];
    let heroRotateTimer = null;
    let allGenresWithMovies = [];

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const data = await API.catalog.homepage();
            renderHomepage(data);
        } catch (e) {
            console.error('Failed to load homepage:', e);
            document.getElementById('contentSections').innerHTML = `
            <div class="container" style="text-align:center;padding:80px 0;">
                <h2 style="display:flex; align-items:center; justify-content:center; gap:12px;">Welcome to Flick <img src="/static/img/Logo/logo.svg" style="width:32px; border-radius:8px;"></h2>
                <p style="color:var(--theme-text-secondary);margin-top:16px;">
                    Add movies through the admin panel to get started.
                </p>
                <a href="/admin-panel/" class="btn btn-primary" style="margin-top:24px;">Open Admin CMS</a>
            </div>
        `;
        }
    });

    function renderHomepage(data) {
        // Setup hero with featured movies
        if (data.featured && data.featured.length > 0) {
            heroMovies = data.featured;
            renderHero(heroMovies[0], 0);

            // Auto-rotate hero every 6 seconds
            if (heroMovies.length > 1) {
                heroRotateTimer = setInterval(() => {
                    heroIndex = (heroIndex + 1) % heroMovies.length;
                    renderHero(heroMovies[heroIndex], heroIndex);
                }, 6000);
            }

            // Apply theme from first hero poster
            if (heroMovies[0].poster_display) {
                ThemeEngine.extractAndApply(heroMovies[0].poster_display);
            }
        }

        // Orbital genre ring
        if (data.genres_with_movies && data.genres_with_movies.length > 0) {
            allGenresWithMovies = data.genres_with_movies;
            renderOrbitalRing(data.genres_with_movies);
        }

        // Content sections
        let sections = '';

        if (currentUser) loadContinueWatching();
        sections += '<div id="continueWatchingSection"></div>';

        // Spotlight card for top featured movie
        if (data.featured && data.featured.length > 0) {
            sections += `
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title"><img src="/static/img/Logo/logo.svg" style="width:24px; vertical-align:middle; display:inline-block; border-radius:4px; margin-right:8px;"> Editor's Pick</h2>
                    </div>
                    <div style="padding:0 var(--space-xl);max-width:var(--container-max);margin:0 auto;">
                        ${buildMovieCard(data.featured[0], 'spotlight', { showDescription: true, showBadges: true })}
                    </div>
                </section>
            `;
        }

        if (data.trending && data.trending.length) {
            sections += createCarousel('trendingCarousel', '<img src="/static/img/Logo/intense.svg" style="width:24px; vertical-align:middle; display:inline-block; border-radius:4px; margin-right:8px;"> Trending Now', data.trending, false, '/browse/?sort=-trending_score');
        }

        // Banner card for top new release
        if (data.new_releases && data.new_releases.length > 0) {
            sections += `
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title"><img src="/static/img/Logo/epic.svg" style="width:24px; vertical-align:middle; display:inline-block; border-radius:4px; margin-right:8px;"> Latest Release</h2>
                    </div>
                    <div style="padding:0 var(--space-xl);max-width:var(--container-max);margin:0 auto;">
                        ${buildMovieCard(data.new_releases[0], 'banner', { showDescription: true, showBadges: true })}
                    </div>
                </section>
            `;
        }

        if (data.new_releases && data.new_releases.length > 1) {
            sections += createCarousel('newCarousel', '<img src="/static/img/Logo/epic.svg" style="width:24px; vertical-align:middle; display:inline-block; border-radius:4px; margin-right:8px;"> New Releases', data.new_releases.slice(1), false, '/browse/?sort=-created_at');
        }
        if (data.top_rated && data.top_rated.length) {
            sections += createCarousel('topRatedCarousel', '<img src="/static/img/Logo/star.svg" style="width:24px; vertical-align:middle; display:inline-block; border-radius:4px; margin-right:8px;"> Top Rated', data.top_rated, false, '/browse/?sort=-rating');
        }
        if (data.featured && data.featured.length > 1) {
            sections += createCarousel('featuredCarousel', '<img src="/static/img/Logo/logo.svg" style="width:24px; vertical-align:middle; display:inline-block; border-radius:4px; margin-right:8px;"> Featured', data.featured.slice(1), false, '', 'hero');
        }

        // Genre sections
        if (data.genres_with_movies) {
            data.genres_with_movies.forEach(gm => {
                if (gm.movies.length > 0) {
                    const id = `genre_${gm.genre.slug}_carousel`;
                    sections += createCarousel(id, gm.genre.name, gm.movies, false, `/genre/${gm.genre.slug}/`);
                }
            });
        }

        document.getElementById('contentSections').innerHTML = sections;
        initRevealAnimations();
    }

    function renderHero(movie, index) {
        const heroSection = document.getElementById('heroSection');
        const backdrop = movie.backdrop_display || movie.poster_display || '';

        heroSection.innerHTML = `
        <div class="hero" id="heroArea">
            <div class="hero-parallax-blur" style="background-image: url('${escapeHtml(backdrop)}')"></div>
            <div class="hero-backdrop cinematic-enter" style="background-image: url('${escapeHtml(backdrop)}')"></div>
            <div class="hero-spotlight" id="heroSpotlight"></div>
            <div class="hero-content">
                <div class="hero-info-panel fade-in">
                    <div class="hero-meta">
                        ${movie.rating ? `<span class="hero-meta-item"><span class="rating">⭐ ${movie.rating.toFixed(1)}</span></span>` : ''}
                        <span class="hero-meta-item">${movie.release_year || ''}</span>
                        ${movie.duration ? `<span class="hero-meta-item">🕐 ${movie.duration} min</span>` : ''}
                        <span class="hero-meta-item">${(movie.content_type || '').toUpperCase()}</span>
                    </div>
                    <h1 class="hero-title">${escapeHtml(movie.title)}</h1>
                    <p class="hero-description">${escapeHtml(movie.description?.substring(0, 180) || '')}</p>
                    <div class="hero-actions">
                        <button class="btn btn-primary btn-lg" onclick="navigateTo('/movie/${escapeHtml(movie.slug)}/')">
                            <i class="fas fa-play"></i> Watch Now
                        </button>
                        <button class="btn btn-ghost btn-lg" onclick="navigateTo('/movie/${escapeHtml(movie.slug)}/')">
                            <i class="fas fa-info-circle"></i> More Info
                        </button>
                    </div>
                    ${heroMovies.length > 1 ? `
                    <div class="hero-dots">
                        ${heroMovies.map((_, i) =>
            `<div class="hero-dot ${i === index ? 'active' : ''}" onclick="goToHero(${i})"></div>`
        ).join('')}
                    </div>
                    ` : ''}
                </div>
            </div>
        </div>
    `;

        // Mouse spotlight follow
        const spotlight = document.getElementById('heroSpotlight');
        const heroArea = document.getElementById('heroArea');
        if (heroArea && spotlight) {
            heroArea.addEventListener('mousemove', (e) => {
                const rect = heroArea.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                spotlight.style.background = `radial-gradient(ellipse 400px 400px at ${x}% ${y}%, rgba(255,255,255,0.03) 0%, transparent 70%)`;
            });
        }
    }

    function goToHero(index) {
        heroIndex = index;
        renderHero(heroMovies[index], index);
        if (heroMovies[index].poster_display) {
            ThemeEngine.extractAndApply(heroMovies[index].poster_display);
        }
        // Reset timer
        clearInterval(heroRotateTimer);
        if (heroMovies.length > 1) {
            heroRotateTimer = setInterval(() => {
                heroIndex = (heroIndex + 1) % heroMovies.length;
                renderHero(heroMovies[heroIndex], heroIndex);
            }, 6000);
        }
    }

    function renderOrbitalRing(genresWithMovies) {
        const section = document.getElementById('orbitalSection');
        const container = document.getElementById('orbitalRingContainer');
        section.style.display = 'block';

        const genreIcons = {
            'action': '<img src="/static/img/Logo/intense.svg" style="width:24px; border-radius:50%;">',
            'comedy': '<img src="/static/img/Logo/feelgood.svg" style="width:24px; border-radius:50%;">',
            'drama': '<img src="/static/img/Logo/chill.svg" style="width:24px; border-radius:50%;">',
            'horror': '<img src="/static/img/Logo/dark.svg" style="width:24px; border-radius:50%;">',
            'sci-fi': '<img src="/static/img/Logo/epic.svg" style="width:24px; border-radius:50%;">',
            'romance': '<img src="/static/img/Logo/romantic.svg" style="width:24px; border-radius:50%;">',
            'thriller': '<img src="/static/img/Logo/intense.svg" style="width:24px; border-radius:50%;">',
            'animation': '<img src="/static/img/Logo/feelgood.svg" style="width:24px; border-radius:50%;">',
            'documentary': '<img src="/static/img/Logo/think.svg" style="width:24px; border-radius:50%;">',
            'fantasy': '<img src="/static/img/Logo/epic.svg" style="width:24px; border-radius:50%;">',
            'mystery': '<img src="/static/img/Logo/dark.svg" style="width:24px; border-radius:50%;">',
            'adventure': '<img src="/static/img/Logo/epic.svg" style="width:24px; border-radius:50%;">',
            'crime': '<img src="/static/img/Logo/intense.svg" style="width:24px; border-radius:50%;">',
            'music': '<img src="/static/img/Logo/feelgood.svg" style="width:24px; border-radius:50%;">',
            'war': '<img src="/static/img/Logo/intense.svg" style="width:24px; border-radius:50%;">',
            'western': '<img src="/static/img/Logo/logo.svg" style="width:24px; border-radius:50%;">',
            'family': '<img src="/static/img/Logo/feelgood.svg" style="width:24px; border-radius:50%;">',
            'history': '<img src="/static/img/Logo/think.svg" style="width:24px; border-radius:50%;">',
            'sport': '<img src="/static/img/Logo/logo.svg" style="width:24px; border-radius:50%;">',
            'biography': '<img src="/static/img/Logo/think.svg" style="width:24px; border-radius:50%;">'
        };

        const total = genresWithMovies.length;
        const radius = 42; // percentage of container

        genresWithMovies.forEach((gm, i) => {
            const angle = (i / total) * 2 * Math.PI - Math.PI / 2;
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);
            const slug = gm.genre.slug.toLowerCase();
            const icon = genreIcons[slug] || '<img src="/static/img/Logo/logo.svg" style="width:24px; border-radius:50%;">';

            const node = document.createElement('div');
            node.className = 'orbital-node';
            node.style.left = `calc(${x}% - 35px)`;
            node.style.top = `calc(${y}% - 35px)`;
            node.setAttribute('data-genre-slug', gm.genre.slug);
            node.innerHTML = `
            <span class="orbital-node-icon">${icon}</span>
            <span class="orbital-node-label">${escapeHtml(gm.genre.name)}</span>
            <span class="orbital-node-count">${gm.movies.length}</span>
        `;
            node.addEventListener('click', () => selectOrbitalGenre(gm));
            container.appendChild(node);
        });
    }

    function selectOrbitalGenre(gm) {
        // Update active node
        document.querySelectorAll('.orbital-node').forEach(n => n.classList.remove('active'));
        const activeNode = document.querySelector(`.orbital-node[data-genre-slug="${gm.genre.slug}"]`);
        if (activeNode) activeNode.classList.add('active');

        // Update center
        document.getElementById('orbitalCenterText').textContent = gm.genre.name;

        // Show movies
        const expanded = document.getElementById('orbitalExpanded');
        const grid = document.getElementById('orbitalMovies');
        expanded.classList.add('active');
        grid.innerHTML = gm.movies.map(m => buildMovieCard(m, 'standard', { showBadges: true, showGenres: true })).join('');
    }

    async function loadContinueWatching() {
        try {
            const history = await API.auth.continueWatching();
            const section = document.getElementById('continueWatchingSection');
            if (history && history.length > 0 && section) {
                const movies = history.map(h => ({
                    id: h.movie_id,
                    title: h.movie_title,
                    slug: `movie-${h.movie_id}`,
                    poster_display: h.movie_poster,
                    progress: h.progress,
                }));
                section.innerHTML = createCarousel('continueCarousel', '<img src="/static/img/Logo/logo.svg" style="width:24px; vertical-align:middle; display:inline-block; border-radius:4px; margin-right:8px;"> Continue Watching', movies, true);
            }
        } catch { }
    }
</script>
{% endblock %}
