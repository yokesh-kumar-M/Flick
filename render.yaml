# ──────────────────────────────────────────────────────────────────
# Flick Deployment Blueprint for Render
# ──────────────────────────────────────────────────────────────────
# This file defines the infrastructure as code for Render.com.
# Connect your GitHub repository to Render and use this file (Blueprint)
# to deploy all 7 microservices automatically.
# 
# Note: This will create 1 Redis instance and 7 Web Services.
# Depending on your Render billing plan, you may want to drop the 'plan: free'
# if you intend to run this on a paid tier, or if Free plan limits are hit.

services:
  # ── Infrastructure ──
  - type: redis
    name: flick-redis
    ipAllowList: []
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # ── Backend Microservices ──
  - type: web
    name: flick-auth-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./auth_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: flick-catalog-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./catalog_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: flick-access-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./access_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: flick-streaming-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./streaming_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: flick-recommendation-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./recommendation_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: flick-notification-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./notification_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  # ── Gateway (Frontend + Routing) ──
  - type: web
    name: flick-gateway
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./gateway/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: flick-auth-service
          property: hostport
      - key: CATALOG_SERVICE_URL
        fromService:
          type: web
          name: flick-catalog-service
          property: hostport
      - key: ACCESS_SERVICE_URL
        fromService:
          type: web
          name: flick-access-service
          property: hostport
      - key: STREAMING_SERVICE_URL
        fromService:
          type: web
          name: flick-streaming-service
          property: hostport
      - key: RECOMMENDATION_SERVICE_URL
        fromService:
          type: web
          name: flick-recommendation-service
          property: hostport
      - key: NOTIFICATION_SERVICE_URL
        fromService:
          type: web
          name: flick-notification-service
          property: hostport
