# ──────────────────────────────────────────────────────────────────
# Flick Deployment Blueprint for Render
# ──────────────────────────────────────────────────────────────────
# This file defines the infrastructure as code for Render.com.
# Connect your GitHub repository to Render and use this file (Blueprint)
# to deploy all 7 microservices automatically.
# 
# Note: This will create 1 Redis instance and 7 Web Services.
# Depending on your Render billing plan, you may want to drop the 'plan: free'
# if you intend to run this on a paid tier, or if Free plan limits are hit.

services:
  # ── Infrastructure ──
  - type: redis
    name: flick-redis
    ipAllowList: []
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # ── Backend Microservices ──
  - type: web
    name: flick-auth-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./auth_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: flick-catalog-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./catalog_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: flick-access-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./access_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: flick-streaming-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./streaming_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: flick-recommendation-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./recommendation_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: flick-notification-service
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./notification_service/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # ── Gateway (Frontend + Routing) ──
  - type: web
    name: flick-gateway
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./gateway/Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: flick-redis
          property: connectionString
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: flick-auth-service
          property: hostport
      - key: CATALOG_SERVICE_URL
        fromService:
          type: web
          name: flick-catalog-service
          property: hostport
      - key: ACCESS_SERVICE_URL
        fromService:
          type: web
          name: flick-access-service
          property: hostport
      - key: STREAMING_SERVICE_URL
        fromService:
          type: web
          name: flick-streaming-service
          property: hostport
      - key: RECOMMENDATION_SERVICE_URL
        fromService:
          type: web
          name: flick-recommendation-service
          property: hostport
      - key: NOTIFICATION_SERVICE_URL
        fromService:
          type: web
          name: flick-notification-service
          property: hostport
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

# ──────────────────────────────────────────────────────────────────
# SCALING HINTS
# ──────────────────────────────────────────────────────────────────
# For production scaling, update the following:
#
# 1. Auth Service: Scale to 2+ instances (handles authentication traffic)
# 2. Catalog Service: Scale to 2+ instances (high read traffic for metadata)
# 3. Access Service: Scale to 2+ instances (payment verification)
# 4. Streaming Service: Scale to 3+ instances (video streaming is I/O intensive)
# 5. Recommendation Service: Scale to 2+ instances (ML inference)
# 6. Notification Service: Scale to 1-2 instances (background jobs)
# 7. Gateway: Scale to 3+ instances (handles all traffic)
#
# For auto-scaling, add to each service:
#   autoScale:
#     enabled: true
#     minInstances: 1
#     maxInstances: 5
#     targetCPUPercent: 70
#
# Redis can be upgraded to paid plan for better performance at scale.